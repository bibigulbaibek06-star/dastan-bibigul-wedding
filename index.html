<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дастан & Бибігүл Шақырту</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; text-align: center; background-color: #fff5f8; margin: 0; padding: 20px; color: #4a4a4a; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #fce4ec; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 45px; color: #d63384; margin: 10px 0; }
        .info { font-size: 18px; margin: 15px 0; line-height: 1.6; }
        .date { font-size: 22px; font-weight: bold; color: #d63384; border-bottom: 2px solid #fce4ec; display: inline-block; padding-bottom: 5px; }
        .address-box { background: #fff0f5; padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; }
        .map-frame { width: 100%; height: 250px; border-radius: 15px; border: none; margin-top: 10px; }
        .btn { background: #d63384; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; margin-top: 20px; width: 100%; }
        .hosts { font-style: italic; margin-top: 20px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <p>Қадірлі ағайын-туыс, бауырлар және достар!</p>
    <h1>Дастан & Бибігүл</h1>
    <p class="info">Сіздерді шаңырақ көтеру тойымыздың қадірлі қонағы болуға шақырамыз!</p>
    
    <div class="date">6 маусым, 2026 жыл</div>
    <p>Басталуы: 18:00</p>

    <div class="address-box">
        <strong>Мекен-жайымыз:</strong><br>
        Шымкент қаласы,<br>
        "Алтын Сарай" мейрамханасы<br>
        (Байтұрсынов көшесі, 12)
        
        <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2948.847171447!2d69.585!3d42.315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDLCsDE4JzU0LjAiTiA2OcKwMzUnMDYuMCJF!5e0!3m2!1skk!2skz!4v1680000000000" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <p class="hosts">Той иелері: Омар - Райхан</p>

    <button class="btn" onclick="playMusic()">🎵 Музыканы қосу</button>
    
    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    function playMusic() {
        var audio = document.getElementById("myAudio");
        if (audio.paused) {
            audio.play();
        } else {
            audio.pause();
        }
    }
</script>

</bo>
</ht>
