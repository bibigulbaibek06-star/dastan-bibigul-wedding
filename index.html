<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дастан & Бибігүл Үйлену тойы</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; text-align: center; background-color: #fff5f8; margin: 0; padding: 0; color: #4a4a4a; }
        .container { padding: 40px 20px; max-width: 500px; margin: auto; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-family: 'Great Vibes', cursive; font-size: 50px; color: #d63384; margin: 10px 0; }
        .date { font-size: 22px; font-weight: bold; color: #d63384; }
        .timer { background: #ffeef4; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 18px; }
        .address-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .map-container { margin-top: 15px; border-radius: 10px; overflow: hidden; height: 250px; }
        .btn { background: #d63384; color: white; padding: 12px 25px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <p>Қадірлі ағайын-туыс, бауырлар және достар!</p>
    <h1>Дастан & Бибігүл</h1>
    <p>Сіздерді шаңырақ көтеру тойымыздың қадірлі қонағы болуға шақырамыз!</p>
    
    <div class="date">6 маусым, 2026 жыл</div>
    <p>Сағат: 18:00</p>

    <div class="timer" id="timer">Жүктелуде...</div>

    <div class="address-section">
        <h3>Той өтетін мекен-жай:</h3>
        <p><strong>Шымкент қаласы,</strong><br>
        "Алтын Сарай" мейрамханасы<br>
        Байтұрсынов көшесі, 12</p>
        
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2948.33783705351!2d69.5855!3d42.315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDLCsDE4JzU0LjAiTiA2OcKwMzUnMDcuOCJF!5e0!3m2!1skk!2skz!4v1650000000000!5m2!1skk!2skz" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <button class="btn" id="musicBtn" onclick="toggleAudio()">🎵 Музыканы қосу</button>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    var audio = document.getElementById("bgMusic");
    var btn = document.getElementById("musicBtn");

    function toggleAudio() {
        if (audio.paused) {
            audio.play();
            btn.innerHTML = "⏸ Музыканы тоқтату";
        } else {
            audio.pause();
            btn.innerHTML = "🎵 Музыканы қосу";
        }
    }

    var countDownDate = new Date("June 6, 2026 18:00:00").getTime();
    setInterval(function() {
        var now = new Date().getTime();
        var distance = countDownDate - now;
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById("timer").innerHTML = "Тойға: " + days + " күн " + hours + " сағат " + minutes + " минут қалды";
    }, 1000);
</script>

</body>
</html>
